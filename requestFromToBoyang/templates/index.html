{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>提交一个新需求</h2>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <form action="{{ url_for('submit') }}" method="post" enctype="multipart/form-data" class="form">
    <label>
      <span>标题 <em>*</em></span>
      <input type="text" name="title" maxlength="120" required
             value="{{ form.title if form else '' }}" placeholder="用一句话描述你的需求" />
    </label>
    <label>
      <span>内容 <em>*</em></span>
      <textarea name="content" rows="6" required
                placeholder="详细说明需求的背景、期望效果等">{{ form.content if form else '' }}</textarea>
    </label>
    <label>
      <span>上传图片 <small>(可选)</small></span>
      <input type="file" name="image" accept="image/*" />
    </label>
    <label>
      <span>上传人 <em>*</em></span>
      <input type="text" name="author" maxlength="40" required
             value="{{ form.author if form else session.get('name', '') }}"
             placeholder="你的名字" />
    </label>
    <div class="actions">
      <button type="submit" class="btn primary">提交需求</button>
      <a class="btn link" href="{{ url_for('list_requirements') }}">查看所有需求和目前进度 →</a>
    </div>
  </form>
</section>
{% endblock %}
