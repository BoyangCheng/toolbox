# nginx vhost: toolbox.droplets.com.cn → 127.0.0.1:5000 (Flask + waitress)
#
# 安装：
#   sudo cp deploy/nginx/toolbox.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/toolbox.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 申请 HTTPS（会自动改这份配置加 listen 443 + 80→443 redirect）：
#   sudo certbot --nginx -d toolbox.droplets.com.cn --redirect

server {
    listen 80;
    listen [::]:80;
    server_name toolbox.droplets.com.cn;

    # 上传图片最大 16MB（和 app.MAX_CONTENT_LENGTH 对齐，留点余量）
    client_max_body_size 20M;

    access_log /var/log/nginx/toolbox.access.log;
    error_log  /var/log/nginx/toolbox.error.log;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
