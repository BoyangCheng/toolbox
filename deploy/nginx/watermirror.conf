# nginx vhost: watermirror.droplets.com.cn → 127.0.0.1:3000 (Next.js)
#
# 安装：
#   sudo cp deploy/nginx/watermirror.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/watermirror.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 申请 HTTPS：
#   sudo certbot --nginx -d watermirror.droplets.com.cn --redirect

server {
    listen 80;
    listen [::]:80;
    server_name watermirror.droplets.com.cn;

    # Next.js 上传 / multipart 默认 50M，按实际业务改
    client_max_body_size 50M;

    access_log /var/log/nginx/watermirror.access.log;
    error_log  /var/log/nginx/watermirror.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR / WebSocket / Server Actions 需要这两行
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
